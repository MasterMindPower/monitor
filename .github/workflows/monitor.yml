name: URL Monitor

on:
  schedule:
    # Run every 6 hours (adjust as needed, e.g., '0 * * * *' for hourly)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to manually trigger the workflow from the GitHub UI

jobs:
  check-urls:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the log-url file back to the repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run URL checks
        # Pass the GitHub Secret named 'URLS' to the python script
        env:
          URLS: ${{ secrets.URLS }}
        run: python check_urls.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add log-url
          # Only commit if there are changes to avoid failing the workflow when no changes occur
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update URL status log"
            git push
          fi
